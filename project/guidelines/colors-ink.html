<!-- @dsCard group="Colors" viewport="700x150" name="Ink Scale" subtitle="Cinematic darks — the stage every screen sits on" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body { display: flex; gap: 8px; padding: 16px; background: #000; }
  .sw { flex: 1; height: 100px; padding: 8px 10px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid var(--border-subtle); }
  .t { font-size: 10px; letter-spacing: 0.12em; color: var(--text-secondary); text-transform: uppercase; }
</style></head>
<body>
  <div class="sw" style="background:var(--ink-950)"><div class="t">ink-950</div></div>
  <div class="sw" style="background:var(--ink-900)"><div class="t">ink-900</div></div>
  <div class="sw" style="background:var(--ink-800)"><div class="t">ink-800</div></div>
  <div class="sw" style="background:var(--ink-700)"><div class="t">ink-700</div></div>
  <div class="sw" style="background:var(--ink-600)"><div class="t">ink-600</div></div>
</body></html>
