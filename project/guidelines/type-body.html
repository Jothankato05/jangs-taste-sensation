<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px 32px; background: var(--surface-page); display: grid; grid-template-columns: 1.1fr 1fr; gap: 32px; align-items: center; }
  p { margin: 0; font-size: var(--text-body); font-weight: 300; line-height: var(--leading-body); color: var(--text-secondary); }
  .dish { border-top: 1px solid var(--border-subtle); padding-top: 10px; }
  .dish-name { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; }
  .dish-desc { font-size: 13px; font-weight: 300; color: var(--text-tertiary); margin-top: 4px; }
</style></head>
<body>
  <p>Twelve seats. One counter. Chef Jang cooks a single tasting course built on fire, ferment and season — served the moment it is ready.</p>
  <div class="dish">
    <div class="dish-name"><span>Charred Octopus</span><span style="color:var(--text-accent)">32</span></div>
    <div class="dish-desc">gochujang glaze, smoked leek, black garlic</div>
  </div>
</body></html>
