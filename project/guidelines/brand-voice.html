<!-- @dsCard group="Brand" viewport="700x180" name="Voice" subtitle="Declarative. Short. Ends with a period." -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px 32px; background: var(--surface-page); display: grid; grid-template-columns: 1fr 1fr; gap: 8px 40px; align-content: center; }
  .yes, .no { font-size: 15px; font-weight: 500; letter-spacing: 0.06em; }
  .yes::before { content: "✓  "; color: var(--morning-fog); }
  .no { color: var(--text-tertiary); text-decoration: line-through; font-weight: 300; }
  .h { font-size: 10px; letter-spacing: 0.42em; text-transform: uppercase; color: var(--text-accent); margin-bottom: 6px; }
</style></head>
<body>
  <div>
    <div class="h">Say</div>
    <div class="yes">SEARED. SERVED.</div>
    <div class="yes">Your table is waiting.</div>
    <div class="yes">Twelve seats. One fire.</div>
  </div>
  <div>
    <div class="h">Never</div>
    <div class="no">We're so excited to welcome you!</div>
    <div class="no">Check out our amazing menu 🍜</div>
    <div class="no">The best dining experience ever!!</div>
  </div>
</body></html>
