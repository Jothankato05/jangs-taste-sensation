<!-- @dsCard group="Colors" viewport="700x190" name="Fog & Water Scales" subtitle="Warm and cool tint ramps of the two accents" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px; background: var(--ink-900); display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; height: 66px; padding: 8px 10px; display: flex; align-items: flex-end; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--fog-100);color:#0a0a0b">fog-100</div>
    <div class="sw" style="background:var(--fog-200);color:#0a0a0b">fog-200</div>
    <div class="sw" style="background:var(--fog-300);color:#0a0a0b">fog-300</div>
    <div class="sw" style="background:var(--fog-400);color:#0a0a0b">fog-400</div>
    <div class="sw" style="background:var(--fog-500);color:#fff">fog-500</div>
  </div>
  <div class="row">
    <div class="sw" style="background:var(--water-100);color:#0a0a0b">water-100</div>
    <div class="sw" style="background:var(--water-200);color:#0a0a0b">water-200</div>
    <div class="sw" style="background:var(--water-300);color:#0a0a0b">water-300</div>
    <div class="sw" style="background:var(--water-400);color:#0a0a0b">water-400</div>
    <div class="sw" style="background:var(--water-500);color:#fff">water-500</div>
  </div>
</body></html>
