<!-- @dsCard group="Type" viewport="700x210" name="Display" subtitle="Bold caps, hard periods — the billboard voice" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 28px 32px; background: var(--surface-page); display: flex; flex-direction: column; gap: 10px; justify-content: center; }
  .kicker { font-size: 11px; font-weight: 500; letter-spacing: var(--tracking-kicker); text-transform: uppercase; color: var(--text-accent); }
  h1 { margin: 0; font-size: 44px; font-weight: 700; letter-spacing: var(--tracking-display); line-height: var(--leading-display); text-transform: uppercase; }
  .sub { font-size: 15px; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-secondary); }
</style></head>
<body>
  <div class="kicker">Chef Jang</div>
  <h1>Taste. Sensation.</h1>
  <div class="sub">Your table is waiting.</div>
</body></html>
