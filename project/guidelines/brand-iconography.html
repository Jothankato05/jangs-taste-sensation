<!-- @dsCard group="Brand" viewport="700x150" name="Iconography" subtitle="Lucide via CDN — 1.5px stroke hairlines (substitution: no icon set provided)" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 20px 28px; background: var(--surface-page); display: flex; gap: 28px; align-items: center; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--text-secondary); }
  .ic svg { width: 22px; height: 22px; }
  .ic span { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary); }
  .ic.active { color: var(--morning-fog); }
</style></head>
<body>
  <div class="ic"><i data-lucide="utensils"></i><span>utensils</span></div>
  <div class="ic active"><i data-lucide="flame"></i><span>flame · active</span></div>
  <div class="ic"><i data-lucide="wine"></i><span>wine</span></div>
  <div class="ic"><i data-lucide="calendar"></i><span>calendar</span></div>
  <div class="ic"><i data-lucide="map-pin"></i><span>map-pin</span></div>
  <div class="ic"><i data-lucide="arrow-right"></i><span>arrow-right</span></div>
  <div class="ic"><i data-lucide="clock"></i><span>clock</span></div>
  <script>lucide.createIcons({ attrs: { "stroke-width": 1.5 } });</script>
</body></html>
