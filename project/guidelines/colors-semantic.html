<!-- @dsCard group="Colors" viewport="700x180" name="Text & Surfaces" subtitle="Semantic roles on the dark stage" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px 24px; background: var(--surface-page); display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: center; }
  .card { background: var(--surface-card); border: 1px solid var(--border-subtle); padding: 16px 18px; border-radius: 2px 20px 2px 2px; }
  .k { font-size: 10px; letter-spacing: 0.42em; text-transform: uppercase; color: var(--text-accent); margin-bottom: 6px; }
  .lines { display: flex; flex-direction: column; gap: 6px; font-size: 14px; }
</style></head>
<body>
  <div class="lines">
    <span style="color:var(--text-primary)">text-primary — 96% white</span>
    <span style="color:var(--text-secondary)">text-secondary — 64% white</span>
    <span style="color:var(--text-tertiary)">text-tertiary — 40% white</span>
    <span style="color:var(--text-accent)">text-accent — Morning Fog</span>
  </div>
  <div class="card">
    <div class="k">Surface Card</div>
    <div style="font-size:13px;color:var(--text-secondary)">4% white on ink-950, hairline border, signature corner.</div>
  </div>
</body></html>
