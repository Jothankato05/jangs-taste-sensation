<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 20px 28px; background: var(--surface-page); display: flex; align-items: flex-end; gap: 14px; }
  .s { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { width: 22px; background: var(--morning-fog); opacity: 0.85; }
  .t { font-size: 10px; color: var(--text-tertiary); letter-spacing: 0.08em; }
</style></head>
<body>
  <div class="s"><div class="bar" style="height:4px"></div><span class="t">4</span></div>
  <div class="s"><div class="bar" style="height:8px"></div><span class="t">8</span></div>
  <div class="s"><div class="bar" style="height:12px"></div><span class="t">12</span></div>
  <div class="s"><div class="bar" style="height:16px"></div><span class="t">16</span></div>
  <div class="s"><div class="bar" style="height:24px"></div><span class="t">24</span></div>
  <div class="s"><div class="bar" style="height:32px"></div><span class="t">32</span></div>
  <div class="s"><div class="bar" style="height:48px"></div><span class="t">48</span></div>
  <div class="s"><div class="bar" style="height:64px"></div><span class="t">64</span></div>
  <div class="s"><div class="bar" style="height:96px"></div><span class="t">96</span></div>
</body></html>
