<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--surface-page); display: grid; place-items: center; height: 190px; margin: 0; }
  .lock { text-align: center; display: flex; flex-direction: column; gap: 10px; }
  .mark { font-size: 34px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; padding-left: 0.3em; }
  .tag { font-size: 10px; font-weight: 400; letter-spacing: 0.5em; text-transform: uppercase; color: var(--text-secondary); padding-left: 0.5em; }
</style></head>
<body>
  <div class="lock">
    <div class="mark">Jang's</div>
    <div class="tag">Taste · Sensation</div>
  </div>
</body></html>
