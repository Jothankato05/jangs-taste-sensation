<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { padding: 26px 30px; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox, Radio, Switch } = window.JangSTasteSensationDesignSystem_4dc13a;
function Demo() {
  const [name, setName] = React.useState("");
  const [party, setParty] = React.useState("");
  const [counter, setCounter] = React.useState(true);
  const [pairing, setPairing] = React.useState(false);
  const [seat, setSeat] = React.useState("counter");
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 26 }}>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 28 }}>
        <Input label="Name" placeholder="Full name" value={name} onChange={setName}></Input>
        <Select label="Party size" placeholder="Choose" options={["2 guests", "4 guests", "6 guests"]} value={party} onChange={setParty}></Select>
        <Input label="Email" placeholder="you@..." error="Required"></Input>
      </div>
      <div style={{ display: "flex", gap: 30, alignItems: "center", flexWrap: "wrap" }}>
        <Checkbox label="Counter seating" checked={counter} onChange={setCounter}></Checkbox>
        <Radio label="Counter" checked={seat === "counter"} onChange={() => setSeat("counter")}></Radio>
        <Radio label="Table" checked={seat === "table"} onChange={() => setSeat("table")}></Radio>
        <Switch label="Wine pairing" checked={pairing} onChange={setPairing}></Switch>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body></html>
